[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#111827"
textColor = "#F8FAFC"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 25
fileWatcherType = "auto"

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
